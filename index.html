<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Run Co.">
<meta name="theme-color" content="#1A3A2A">
<title>Thompson Run Co.</title>
<link rel="stylesheet" href="/style.css">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="logo"><span>Thompson</span><br>Run Co.</div>
    <div class="logo-sub">27 Apr — 19 Jul 2026</div>
    <div class="nav-section">Train</div>
    <button class="nav-item active" onclick="showPage('dashboard',this)"><span class="nav-dot" style="background:#378ADD"></span>Dashboard</button>
    <button class="nav-item" onclick="showPage('schedule',this)"><span class="nav-dot" style="background:#1D9E75"></span>Weekly Schedule</button>
    <button class="nav-item" onclick="showPage('coach',this)"><span class="nav-dot" style="background:#7F77DD"></span>AI Coach</button>
    <button class="nav-item" onclick="showPage('activities',this)"><span class="nav-dot" style="background:#FC4C02"></span>Activities</button>
    <button class="nav-item" onclick="showPage('meals',this)"><span class="nav-dot" style="background:#EF9F27"></span>Meal Tracker</button>
    <!-- Mobile-only More button (hidden on desktop via CSS) -->
    <button class="mobile-more-btn" id="more-btn" onclick="openMoreDrawer()">More</button>
    <div class="nav-section">Reference</div>
    <button class="nav-item" onclick="showPage('paces',this)"><span class="nav-dot" style="background:#378ADD"></span>Training Paces</button>
    <button class="nav-item" onclick="showPage('strength',this)"><span class="nav-dot" style="background:#7F77DD"></span>Strength Plan</button>
    <button class="nav-item" onclick="showPage('nutrition',this)"><span class="nav-dot" style="background:#EF9F27"></span>Nutrition</button>
    <button class="nav-item" onclick="showPage('methodology',this)"><span class="nav-dot" style="background:#888780"></span>Methodology</button>
    <button class="nav-item" onclick="showPage('hamstring',this)"><span class="nav-dot" style="background:#E24B4A"></span>Injury Management</button>
    <div class="sidebar-stats">
      <div class="sidebar-stat"><div class="sidebar-stat-label">5km PB</div><div class="sidebar-stat-val">20:50 <span>→ sub-20</span></div></div>
      <div class="sidebar-stat"><div class="sidebar-stat-label">Target</div><div class="sidebar-stat-val">Sub-42:00 <span>@ 4:11/km</span></div></div>
      <div class="sidebar-stat"><div class="sidebar-stat-label">Race Day</div><div class="sidebar-stat-val">19 Jul <span>2026</span></div></div>
    </div>
    <div class="sidebar-strava">
      <div class="sidebar-strava-label">Strava Sync</div>
      <div class="sidebar-strava-status"><span class="s-dot" id="sidebar-sync-dot"></span><span id="sidebar-sync-text">Not connected</span></div>
    </div>
  </aside>

  <main class="main" id="main-content">
    <div id="page-dashboard" class="page active"></div>
    <div id="page-schedule" class="page"></div>
    <div id="page-coach" class="page"></div>
    <div id="page-activities" class="page"></div>
    <div id="page-meals" class="page"></div>
    <div id="page-paces" class="page"></div>
    <div id="page-strength" class="page"></div>
    <div id="page-nutrition" class="page"></div>
    <div id="page-methodology" class="page"></div>
    <div id="page-hamstring" class="page"></div>
  </main>

  <!-- Mobile More drawer -->
  <div id="more-overlay" onclick="closeMoreDrawer()" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1998"></div>
  <div id="more-drawer" style="display:none;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-radius:20px 20px 0 0;z-index:1999;padding:0 0 env(safe-area-inset-bottom,0)">
    <div style="width:36px;height:4px;background:var(--border-strong);border-radius:2px;margin:12px auto 4px"></div>
    <div style="padding:8px 20px 20px">
      <div style="font-size:11px;font-family:var(--mono);color:var(--text-faint);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:12px">Reference</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <button class="more-drawer-btn" onclick="showPageFromDrawer('paces')">⚡ Training Paces</button>
        <button class="more-drawer-btn" onclick="showPageFromDrawer('strength')">🏋️ Strength Plan</button>
        <button class="more-drawer-btn" onclick="showPageFromDrawer('nutrition')">📋 Nutrition</button>
        <button class="more-drawer-btn" onclick="showPageFromDrawer('methodology')">📖 Methodology</button>
        <button class="more-drawer-btn" onclick="showPageFromDrawer('hamstring')" style="grid-column:span 2">🦵 Injury Management</button>
      </div>
    </div>
  </div>
</div>
<script src="/app.js"></script>
</body>
</html>
